name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  build-test-analyze:
    runs-on: macos-14
    timeout-minutes: 10
    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Build and test
        run: make verify
